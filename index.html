<script>
  // Read query parameters from the wrapper URL
  const params = new URLSearchParams(window.location.search);

  const testtitle = params.get("testtitle") || "";
  const startdate = params.get("startdate") || "";
  const enddate   = params.get("enddate")   || "";
  const tduration = params.get("tduration") || "";
  const twindow   = params.get("twindow")   || "";

  // Base Canvas App URL WITH tenantId baked in
  const baseUrl =
    "https://apps.powerapps.com/play/e/default-bb8b8a6b-2799-4f34-bf92-85f819bc006f/a/b343f2b0-da46-45e1-ba9e-82bafca430d2" +
    "?tenantId=bb8b8a6b-2799-4f34-bf92-85f819bc006f";

  // Build final URL
  const finalUrl =
    baseUrl +
    "&testtitle=" + encodeURIComponent(testtitle) +
    "&startdate=" + encodeURIComponent(startdate) +
    "&enddate=" + encodeURIComponent(enddate) +
    "&tduration=" + encodeURIComponent(tduration) +
    "&twindow=" + encodeURIComponent(twindow) +
    "&skipMobileRedirect=1" +
    "&source=iframe#";

  // Create iframe dynamically
  const iframe = document.createElement("iframe");
  iframe.src = finalUrl;

  let loaded = false;
  let loadTime = Date.now();

  iframe.onload = () => {
    loaded = true;
    const elapsed = Date.now() - loadTime;

    // If it loads too fast, it's the Power Apps error page
    if (elapsed < 600) {
      document.getElementById("loading").innerHTML = `
        <div>
          <strong>The app could not load.</strong><br><br>
          If you are using <strong>Brave</strong> or a privacy‑focused browser:<br><br>
          • Tap the Brave lion icon<br>
          • Turn <strong>Shields OFF</strong> for this site<br>
          • Or allow cookies and cross‑site tracking<br><br>
          Then refresh the page.
        </div>
      `;
      return;
    }

    document.getElementById("loading").style.display = "none";
    iframe.style.display = "block";
  };

  document.body.appendChild(iframe);

  // Fallback if iframe never loads at all
  setTimeout(() => {
    if (!loaded) {
      document.getElementById("loading").innerHTML = `
        <div>
          <strong>The app is taking longer than expected to load.</strong><br><br>
          If you are using <strong>Brave</strong> or a privacy‑focused browser:<br><br>
          • Tap the Brave lion icon<br>
          • Turn <strong>Shields OFF</strong> for this site<br>
          • Or allow cookies and cross‑site tracking<br><br>
          Then refresh the page.
        </div>
      `;
    }
  }, 3500);
</script>
